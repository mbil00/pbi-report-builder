kind: visual
name: dropdown-slicer
category: slicer
description: Compact dropdown slicer — title visible, header hidden to avoid label clipping.
tags:
  - slicer
  - dropdown
  - filter
parameters:
  title:
    type: string
    default: Category
  field:
    type: field
    default: Product.Category
payload:
  type: slicer
  size: 180 x 60
  title:
    show: true
    text: '{{ title }}'
    fontSize: 10
    color: '#605E5C'
  slicerHeader.show: false
  chart:data.mode: Dropdown
  border.show: true
  border.color: '#E1DFDD'
  border.radius: 4
  border.width: 1
  background.show: true
  background.color: '#FFFFFF'
  slicerItems.fontColor: '#323130'
  slicerItems.fontSize: 10
  bindings:
    Values: '{{ field }}'
