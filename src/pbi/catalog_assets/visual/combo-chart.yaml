kind: visual
name: combo-chart
category: chart
description: Column + line combo chart with dual axes — columns on Y, line on Y2.
tags:
  - chart
  - combo
  - dual-axis
parameters:
  title:
    type: string
    default: Revenue vs Margin
  category:
    type: field
    default: Date.Month
  column_value:
    type: field
    default: Measures.Revenue
  line_value:
    type: field
    default: Measures.MarginPct
payload:
  type: lineClusteredColumnComboChart
  size: 560 x 340
  title:
    show: true
    text: '{{ title }}'
    fontSize: 12
    bold: true
    color: '#252423'
  legend.show: true
  legend.showTitle: false
  legend.position: Top
  legend.fontSize: 9
  legend.color: '#605E5C'
  xAxis.show: true
  xAxis.title: false
  xAxis.gridlines: false
  yAxis.show: true
  yAxis.title: false
  yAxis.gridlines: true
  yAxis.gridlineColor: '#E1DFDD'
  yAxis.gridlineStyle: dotted
  chart:valueAxis.secShow: true
  labels.show: false
  plotArea.transparency: 100
  bindings:
    Category: '{{ category }}'
    Y: '{{ column_value }}'
    Y2: '{{ line_value }}'
