name: corporate-matrix
description: Professional matrix with accent headers, stepped rows, and subtotals.
properties:
  border.show: false
  background.show: false
  title.show: true
  title.fontSize: 12
  title.bold: true
  title.color: '#252423'
  columnHeaders.fontColor: '#FFFFFF'
  columnHeaders.backColor: '#2B579A'
  columnHeaders.fontSize: 10
  columnHeaders.bold: true
  columnHeaders.wordWrap: true
  rowHeaders.fontColor: '#252423'
  rowHeaders.backColor: '#FFFFFF'
  rowHeaders.fontSize: 10
  rowHeaders.bold: true
  rowHeaders.steppedLayout: true
  rowHeaders.steppedIndent: 20
  rowHeaders.showExpandCollapse: true
  values.fontColor: '#323130'
  values.backColor: '#FFFFFF'
  values.altBackColor: '#F3F2F1'
  values.fontSize: 10
  grid.vertical: true
  grid.verticalColor: '#E1DFDD'
  grid.verticalWeight: 1
  grid.horizontal: true
  grid.horizontalColor: '#E1DFDD'
  grid.horizontalWeight: 1
  grid.rowPadding: 4
  subTotals.rowSubtotals: true
  subTotals.columnSubtotals: true
