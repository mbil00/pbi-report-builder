name: minimal-table
description: Clean table with subtle header, alternating rows, horizontal gridlines only.
properties:
  border.show: false
  background.show: false
  title.show: true
  title.fontSize: 12
  title.bold: true
  title.color: '#252423'
  columnHeaders.fontColor: '#252423'
  columnHeaders.backColor: '#F3F2F1'
  columnHeaders.fontSize: 10
  columnHeaders.bold: true
  columnHeaders.wordWrap: true
  columnHeaders.autoSize: true
  values.fontColor: '#323130'
  values.backColor: '#FFFFFF'
  values.altBackColor: '#FAF9F8'
  values.fontSize: 10
  values.wordWrap: false
  grid.vertical: false
  grid.horizontal: true
  grid.horizontalColor: '#EDEBE9'
  grid.horizontalWeight: 1
  grid.rowPadding: 3
  total.show: false
