# Filter types — all supported modes.
# Filters can be set at page level or visual level.

pages:
- name: Filter Examples

  # --- Page-level filters (apply to all visuals on the page) ---
  filters:

  # Categorical: exact match on specific values
  - field: Sales.Region
    type: categorical
    values: [East, West, North]

  # Include: whitelist values
  - field: Product.Category
    type: include
    values: [Bikes, Accessories]

  # Exclude: blacklist values
  - field: Product.Status
    type: exclude
    values: [Discontinued]

  # Range: numeric or date bounds
  - field: Calendar.Year
    type: range
    min: 2023
    max: 2025

  # Top N: keep only the top/bottom N by a measure
  - field: Product.Name
    type: topN
    count: 10
    by: Sales.TotalRevenue
    direction: Top

  # Hidden + locked filters (not visible or editable by report viewers)
  - field: Sales.Channel
    type: categorical
    values: [Online]
    hidden: true
    locked: true

  # Advanced: text operators — contains, starts-with, does-not-contain, does-not-start-with
  - field: Product.Name
    type: advanced
    operator: contains
    value: Pro

  - field: Customer.Region
    type: advanced
    operator: starts-with
    value: North

  - field: Product.Name
    type: advanced
    operator: does-not-contain
    value: Test

  # Advanced: comparison operators — is, is-not, greater-than, less-than, etc.
  - field: Product.Category
    type: advanced
    operator: is
    value: Bikes

  - field: Sales.Revenue
    type: advanced
    operator: greater-than
    value: 1000

  # Advanced: null/empty checks — is-blank, is-not-blank, is-empty, is-not-empty
  - field: Product.Description
    type: advanced
    operator: is-not-blank

  - field: Product.Notes
    type: advanced
    operator: is-not-empty

  # Advanced compound: two conditions joined with and/or
  - field: Product.Name
    type: advanced
    operator: contains
    value: Pro
    operator2: does-not-contain
    value2: Prototype
    logic: and

  - field: Sales.Revenue
    type: advanced
    operator: less-than
    value: 100
    operator2: greater-than
    value2: 10000
    logic: or

  visuals:

  - name: filteredChart
    type: clusteredBarChart
    position: 16, 16
    size: 600 x 400
    bindings:
      Category: Product.Name
      Y: Sales.TotalRevenue

    # --- Visual-level filters (apply only to this visual) ---
    filters:
    - field: Sales.TotalRevenue
      type: range
      min: 1000
